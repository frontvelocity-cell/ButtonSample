<div class="app-container">
  <!-- Merged topbar into header for better semantic structure -->
  <header class="app-header">
    <app-topbar></app-topbar>
    <h1>{{title}}</h1>
  </header>
  
  <!-- Combined dashboard-body and app-main concepts with simplified layout -->
  <main class="app-main">
    <div class="main-layout">
      <app-sidebar></app-sidebar>
      <div class="content-area">
        <!-- Single router-outlet for content rendering - removed duplicate app-main-content -->
        <router-outlet></router-outlet>
      </div>
    </div>
  </main>
  
  <!-- Preserved footer component -->
  <app-footer></app-footer>
</div>
