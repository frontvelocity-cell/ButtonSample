<div class="dashboard-container">
  <!-- Main dashboard header section -->
  <div class="dashboard-header">
    <div class="hero-row">
      <div class="welcome-section">
        <h1 class="dashboard-title">Welcome back, {{ user.name || dashboardTitle || title }}! 👋</h1>
        <p class="subtitle">Here's what's happening in the system today.</p>
      </div>
      <div class="role-card">
        <div class="role-badge">
          <span class="material-icons">admin_panel_settings</span>
        </div>
        <div class="role-info">
          <div class="role-label">Role</div>
          <div class="role-value">{{ user.role }}</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Main dashboard content area -->
  <div class="dashboard-content">
    <!-- Statistics component -->
    <app-stats></app-stats>
    
    <!-- Data tables section -->
    <div class="tables-section">
      <app-flight-assignments-table></app-flight-assignments-table>
      <app-employees-table></app-employees-table>
    </div>
    
    <!-- Dashboard widgets section -->
    <div class="dashboard-widgets">
      <!-- Dashboard widgets will be added here -->
    </div>
    
    <!-- Quick actions component -->
    <app-quick-actions></app-quick-actions>
  </div>
</div>
