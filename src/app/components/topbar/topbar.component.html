<header class="topbar">
  <div class="brand">
    <img src="assets/amadeus-logo.svg" alt="Amadeus Logo" class="logo">
  </div>
  
  <div class="profile-area">
    <div class="notifications">
      <!-- Using Material Icons for consistency -->
      <span class="material-icons">notifications</span>
    </div>
    
    <div class="profile">
      <div class="avatar">
        <!-- Merged: Support both initials and avatar display -->
        <span class="initials" *ngIf="!user.avatar">{{ user.initials }}</span>
        <img *ngIf="user.avatar" [src]="user.avatar" [alt]="user.name" class="avatar-image">
      </div>
      <div class="profile-info">
        <div class="profile-name">{{ user.name }}</div>
        <div class="profile-role">{{ user.role }}</div>
      </div>
      <!-- Merged: Unified dropdown icon with consistent naming -->
      <span class="material-icons chevron">keyboard_arrow_down</span>
    </div>
  </div>
</header>
